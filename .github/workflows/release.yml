name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Require release announcement prerequisites
        shell: pwsh
        env:
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          LOPARI_APP_ACTIONS_TOKEN: ${{ secrets.LOPARI_APP_ACTIONS_TOKEN }}
        run: |
          if (-not $env:DISCORD_RELEASE_WEBHOOK) {
            Write-Host "::error::DISCORD_RELEASE_WEBHOOK secret is not set - every release must be announced to Discord, so this run is refused before the release is created. Set it with 'gh secret set DISCORD_RELEASE_WEBHOOK --repo ${{ github.repository }}' and re-run."
            exit 1
          }
          $bust = "cb$([DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds())"
          $mods = (Invoke-RestMethod "https://lopari.app/mods.json?$bust").mods
          $entry = @($mods) | Where-Object { $_.repo -eq "${{ github.repository }}" }
          if ($entry -and -not $env:LOPARI_APP_ACTIONS_TOKEN) {
            Write-Host "::error::${{ github.repository }} is in the Lopari catalog but LOPARI_APP_ACTIONS_TOKEN is not set - the catalog pin can't be synced before the announcement, so the Run in Lopari link would serve the previous release. Set the fine-grained PAT (Actions:write on itsloopyo/lopari.app only) and re-run."
            exit 1
          }
          Write-Host "Release announcement prerequisites present."

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') {
            Write-Host "::error::Tag '$tag' is not a valid vX.Y.Z release tag"
            exit 1
          }
          $version = $Matches[1]
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Release version: $version"

      - name: Validate version matches pixi.toml
        shell: pwsh
        run: |
          $expected = "${{ steps.version.outputs.version }}"
          $match = Select-String -Path pixi.toml -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1
          if (-not $match) {
            Write-Host "::error::Could not find version in pixi.toml"
            exit 1
          }
          $actual = $match.Matches[0].Groups[1].Value
          if ($actual -ne $expected) {
            Write-Host "::error::Tag version $expected does not match pixi.toml version $actual"
            exit 1
          }
          Write-Host "Version $actual matches tag"

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6

      - name: Build and package
        shell: pwsh
        run: |
          pixi run package
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Packaging failed"
            exit 1
          }

      - name: Generate release notes
        shell: pwsh
        run: |
          ./cameraunlock-core/scripts/generate-release-notes.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -ArtifactPaths 'src/', 'cameraunlock-core/', 'scripts/install.cmd', 'scripts/uninstall.cmd' `
            -OutputFile release-notes.txt

      - name: Find release ZIPs
        id: zips
        shell: pwsh
        run: |
          $installer = Get-ChildItem release/*-installer.zip | Select-Object -First 1
          $nexus = Get-ChildItem release/*-nexus.zip | Select-Object -First 1
          if (-not $installer) { Write-Host "::error::installer ZIP not found"; exit 1 }
          if (-not $nexus)     { Write-Host "::error::nexus ZIP not found"; exit 1 }
          "installer=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "nexus=$($nexus.FullName)"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:GITHUB_REF_NAME" `
            --title "RV There Yet Head Tracking $env:GITHUB_REF_NAME" `
            --notes-file release-notes.txt `
            "${{ steps.zips.outputs.installer }}" `
            "${{ steps.zips.outputs.nexus }}"

      - name: Sync Lopari catalog pin
        shell: pwsh
        env:
          LOPARI_APP_ACTIONS_TOKEN: ${{ secrets.LOPARI_APP_ACTIONS_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $version = "${{ github.ref_name }}" -replace '^v', ''
          function Get-PinnedVersion {
            $bust = "cb$([DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds())"
            $mods = (Invoke-RestMethod "https://lopari.app/mods.json?$bust").mods
            $entry = @($mods) | Where-Object { $_.repo -eq $repo }
            if (-not $entry) { return $null }
            return @{ inCatalog = $true; pinned = $entry.release.pinned.version }
          }
          $state = Get-PinnedVersion
          if (-not $state) {
            Write-Host "::notice::$repo has no Lopari catalog entry - the announce link will use the /run/ page's GitHub fallback."
            exit 0
          }
          if ($state.pinned -eq $version) {
            Write-Host "Catalog already pins $version."
            exit 0
          }
          Invoke-RestMethod -Method Post `
            -Uri 'https://api.github.com/repos/itsloopyo/lopari.app/actions/workflows/update-pins.yml/dispatches' `
            -Headers @{ Authorization = "Bearer $env:LOPARI_APP_ACTIONS_TOKEN"; Accept = 'application/vnd.github+json' } `
            -ContentType 'application/json' -Body '{"ref":"main"}'
          Write-Host "Requested lopari.app catalog re-pin; waiting for $version to go live..."
          $deadline = [DateTime]::UtcNow.AddMinutes(10)
          while ([DateTime]::UtcNow -lt $deadline) {
            Start-Sleep -Seconds 15
            try {
              $state = Get-PinnedVersion
            } catch {
              # A transient fetch failure is part of what the poll absorbs;
              # a persistent one runs into the deadline below.
              continue
            }
            if ($state.pinned -eq $version) {
              Write-Host "Catalog pin is live: $version."
              exit 0
            }
            Write-Host "  still pinned at $($state.pinned)..."
          }
          Write-Host "::error::Timed out waiting for lopari.app to pin $version (still $($state.pinned)). Check https://github.com/itsloopyo/lopari.app/actions, then re-run this job - the release exists; only the pin sync and announcement are pending."
          exit 1

      - name: Announce release to Discord
        shell: pwsh
        env:
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          if (-not $env:DISCORD_RELEASE_WEBHOOK) {
            Write-Host "::error::DISCORD_RELEASE_WEBHOOK secret is not set - the release was created but not announced. Set it with 'gh secret set DISCORD_RELEASE_WEBHOOK --repo ${{ github.repository }}' and re-run this job."
            exit 1
          }
          $tag  = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $name = (Get-Culture).TextInfo.ToTitleCase(((($repo -split '/')[-1]) -replace '-head-?tracking$','' -replace '-',' '))
          $url  = "https://github.com/$repo/releases/tag/$tag"
          $payload = @{
            username = 'Mod Releases'
            embeds   = @(@{
              title       = "$name Head Tracking $tag"
              url         = $url
              description = "A new release of **$name Head Tracking** is live.`n`n**[Download the $tag release]($url)**`n**[Run in Lopari](https://lopari.app/run/?repo=$repo)**"
              color       = 5814783
            })
          } | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Uri $env:DISCORD_RELEASE_WEBHOOK -Method Post -ContentType 'application/json' -Body $payload
          Write-Host "Announced $tag to Discord."

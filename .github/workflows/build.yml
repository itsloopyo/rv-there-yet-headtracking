name: Build

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  build:
    name: Build and package
    runs-on: windows-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Release v') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6

      - name: Build and package
        shell: pwsh
        run: |
          pixi run package
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Packaging failed"
            exit 1
          }

      - name: Stage installer contents for artifact upload
        shell: pwsh
        run: |
          $installer = Get-ChildItem release/*-installer.zip | Select-Object -First 1
          if (-not $installer) {
            Write-Host "::error::No installer ZIP found in release/"
            exit 1
          }
          $dest = "release/artifact-contents"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Expand-Archive -Path $installer.FullName -DestinationPath $dest -Force

      - name: Compute artifact name from ref
        shell: pwsh
        run: |
          $branch = if ($env:GITHUB_HEAD_REF) { $env:GITHUB_HEAD_REF } else { $env:GITHUB_REF_NAME }
          $sanitized = $branch -replace '[^A-Za-z0-9._-]', '-'
          "ARTIFACT_NAME=RVThereYetHeadTracking-$sanitized" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release/artifact-contents/
          retention-days: 14
          if-no-files-found: error

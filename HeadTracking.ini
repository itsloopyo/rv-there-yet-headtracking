; RV There Yet Head Tracking - configuration

[Network]
Port = 4242

[Tracking]
EnableOnStartup = true
YawSensitivity = 1.0
PitchSensitivity = 1.0
RollSensitivity = 1.0
InvertYaw = false
InvertPitch = false
InvertRoll = false
; 0.0 - 1.0. Higher = steadier but laggier view. A baseline of 0.15 is always
; applied internally, so 0.0 still gets light smoothing; raise this if your
; tracker is jittery (eg a phone app over WiFi).
Smoothing = 0.0
; true = the interaction reticle/prompt follows your aim point while your head
; is turned. false = leave it at screen centre (vanilla).
ShowReticle = true
; Yaw mode: true = horizon-locked yaw (default), false = camera-local
WorldSpaceYaw = true

[Reticle]
; Fine-tune reticle follow strength (1.0 = geometric aim point). Raise/lower if
; the reticle over/undershoots the thing you're pointing at.
Scale = 1.0
; Extra vertical-only multiplier for the reticle follow, to correct the HUD's
; vertical layout scaling. Tune Scale until side-to-side (yaw) locks, then this
; until up-down (pitch) locks.
VerticalScale = 1.0
; Comma-separated UMG widget names moved to the aim point (the look-at reticle
; and object label). Leave blank to use the built-in defaults
; (Crosshair, LookAtObjectName).
WidgetNames =

[Position]
; 6DOF lean tracking - move your head to lean around the cabin. Toggle in-game
; with Page Up (cycles rotation+position / rotation only / position only).
Enabled = true
SensitivityX = 1.0
SensitivityY = 1.0
SensitivityZ = 1.0
InvertX = true
InvertY = false
InvertZ = true
; Travel limits in meters (how far the view can lean).
LimitX = 0.30
LimitY = 0.20
; Z is inverted for this game (InvertZ=true), so leaning forward maps to the
; LimitZBack bound and leaning back to LimitZ. We want MORE range forward than
; back (so leaning back doesn't clip through the seat/player), hence the
; generous value sits on LimitZBack and the restricted one on LimitZ.
LimitZ = 0.10
LimitZBack = 0.40
Smoothing = 0.15

[Hotkeys]
; Recenter (Home), toggle tracking (End), and cycle tracking mode (Page Up)
; are fixed, each also reachable with a Ctrl+Shift chord (T / Y / G). Only the
; yaw-mode toggle is rebindable here. VK code: PageDown = 0x22.
ToggleYawMode = 0x22

[Debug]
; Write RVThereYetHeadTracking.log next to the game executable.
Logging = true
